<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HRlynx – HR guidance, reimagined.</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .logo {
      max-width: 200px;
      margin-bottom: 20px;
    }
    .phone-preview {
      max-width: 300px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }
    .app-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .app-buttons img {
      max-width: 150px;
      cursor: pointer;
    }
    @media (max-width: 500px) {
      .app-buttons img {
        max-width: 130px;
      }
    }
  </style>
</head>
<body>
  {% if link %}
    {% if link.logo %}
      <img src="{{ link.logo.url }}" alt="HRlynx Logo" class="logo" />
    {% endif %}

    {% if link.gif %}
      <img src="{{ link.gif.url }}" alt="App Preview" class="phone-preview" />
    {% endif %}

    <div class="app-buttons">
      {% if link.applelink %}
        <a href="{{ link.applelink }}" target="_blank">
          <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" />
        </a>
      {% endif %}

      {% if link.googlelink %}
        <a href="{{ link.googlelink }}" target="_blank">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play" />
        </a>
      {% endif %}
    </div>
  {% else %}
    <p>No app link configured. Please add one in the admin panel.</p>
  {% endif %}
</body>
</html>
