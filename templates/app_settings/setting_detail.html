<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .last-updated {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p class="last-updated">Last updated: {{ setting.last_updated|date:"F d, Y" }}</p>
    <div class="content">
        {{ setting.content|safe }}
    </div>
</body>
</html>
