upstream backend {
    server api:8000;
}

# HTTP - Redirect to HTTPS
server {
    listen 80;
    server_name shophopapp.com www.shophopapp.com api.shophopapp.com;

    # Certbot challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Main server
server {
    listen 443 ssl;
    server_name shophopapp.com www.shophopapp.com api.shophopapp.com;

    client_max_body_size 500M;

    # SSL Certificate
    ssl_certificate /etc/letsencrypt/live/www.shophopapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.shophopapp.com/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media files
    location /media/ {
        alias /app/media/;
    }

    # Main backend API
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}